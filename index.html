<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IoT Jetson Dashboard</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

#loginBox{
    margin-top:50px;
}

input{
    padding:10px;
    margin:5px;
    width:200px;
}

button{
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
}

#galeria{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:20px;
}

.card{
    background:#1c1c1c;
    padding:10px;
    border-radius:10px;
    width:260px;
}

img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

p{
    margin:5px 0;
    font-size:14px;
}

a{
    color:#4da3ff;
    text-decoration:none;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<h1>IoT Jetson Dashboard</h1>

<!-- LOGIN -->
<div id="loginBox">
    <h3>Login Admin</h3>
    <input id="email" placeholder="email">
    <br>
    <input id="password" type="password" placeholder="password">
    <br>
    <button onclick="login()">Entrar</button>
</div>

<!-- GALERIA -->
<div id="galeria" class="hidden"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://vpvrqtcnbluffwlrmprs.supabase.co";
const SUPABASE_KEY = "sb_publishable_VEE3Grv0HVTDWXJSupfHmQ_iyPZsG8J";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
const ADMIN_EMAIL = "admin@iot.com";

// ---------------- UI ----------------

function mostrarLogin(){
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("galeria").classList.add("hidden");
}

function mostrarApp(){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("galeria").classList.remove("hidden");
}

// ---------------- INIT ----------------

window.onload = async () => {
    const { data } = await supabase.auth.getUser();

    if (data.user) {
        user = data.user;
        mostrarApp();
        cargarImagenes();
    } else {
        mostrarLogin();
    }
};

// ---------------- LOGIN ----------------

window.login = async function(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if(error){
        alert("Error login");
        return;
    }

    user = data.user;

    mostrarApp();
    cargarImagenes();
};

// ---------------- GALERIA ----------------

async function cargarImagenes(){

    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/imagenes?select=*`,
        {
            headers:{
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await res.json();

    const galeria = document.getElementById("galeria");
    galeria.innerHTML = "";

    data.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = item.url;
        img.onclick = () => window.open(item.url, "_blank");

        const fecha = document.createElement("p");
        fecha.innerText = "📅 " + item.fecha;

        const gps = document.createElement("p");
        gps.innerText = `📍 ${item.lat}, ${item.lon}`;

        const mapa = document.createElement("a");
        mapa.href = `https://www.google.com/maps?q=${item.lat},${item.lon}`;
        mapa.target = "_blank";
        mapa.innerText = "Ver mapa";

        card.appendChild(img);
        card.appendChild(fecha);
        card.appendChild(gps);
        card.appendChild(mapa);

        // SOLO ADMIN
        if(user?.email === ADMIN_EMAIL){

            const btn = document.createElement("button");
            btn.innerText = "Eliminar";

            btn.onclick = async () => {

                await fetch("/api/delete", {
                    method: "POST",
                    body: JSON.stringify({
                        filename: item.filename
                    })
                });

                cargarImagenes();
            };

            card.appendChild(btn);
        }

        galeria.appendChild(card);
    });
}

</script>

</body>
</html>
