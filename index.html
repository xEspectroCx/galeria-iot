<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IoT Jetson Dashboard</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

/* ================= HEADER ================= */

#header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin-top:20px;
    flex-wrap:wrap;
}

.logo{
    width:120px;
}

.mapaHeader{
    width:140px;
    border-radius:15px;
}

#titulo h1{
    margin:0;
    font-size:32px;
}

#titulo p{
    margin-top:10px;
    color:#bbb;
    font-size:15px;
}

/* ================= LOGIN ================= */

#loginBox{
    margin-top:50px;
}

input{
    padding:10px;
    margin:5px;
    width:220px;
    border:none;
    border-radius:5px;
}

button{
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
    border:none;
    border-radius:5px;
}

/* ================= BOTONES ================= */

#logoutContainer{
    margin-top:20px;
    margin-bottom:30px;
}

#logoutBtn{
    background:#ff4444;
    color:white;
}

#guestBtn{
    background:#2d7cff;
    color:white;
}

/* ================= GALERIA ================= */

#galeria{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:20px;
}

.card{
    background:#1c1c1c;
    padding:10px;
    border-radius:10px;
    width:260px;
}

.card img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

p{
    margin:5px 0;
    font-size:14px;
}

a{
    color:#4da3ff;
    text-decoration:none;
}

.hidden{
    display:none;
}

.deleteBtn{
    margin-top:10px;
    background:#ff4444;
    color:white;
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->

<div id="header">

    <img
    class="logo"
    src="logo.png">

    <div id="titulo">

        <h1>IoT Jetson Dashboard</h1>

        <p>
        Sistema portátil de adquisición y
        transmisión adaptativa de datos
        </p>

    </div>

    <img
    class="mapaHeader"
    src="mapa.png">

</div>

<!-- ================= LOGIN ================= -->

<div id="loginBox">

    <h3>Login Admin</h3>

    <input id="email" placeholder="email">

    <br>

    <input
        id="password"
        type="password"
        placeholder="password"
    >

    <br>

    <button onclick="login()">
        Entrar Admin
    </button>

    <button
        id="guestBtn"
        onclick="guestMode()"
    >
        Entrar como invitado
    </button>

</div>

<!-- ================= GALERIA ================= -->

<div id="galeria" class="hidden"></div>

<!-- ================= LOGOUT ABAJO ================= -->

<div id="logoutContainer">

    <button
        id="logoutBtn"
        onclick="logout()"
        style="display:none;"
    >
        Cerrar sesión
    </button>

</div>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL =
"https://vpvrqtcnbluffwlrmprs.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwdnJxdGNuYmx1ZmZ3bHJtcHJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDkwNzksImV4cCI6MjA5NDQyNTA3OX0.7rUHZRbFT3OCPoVdBO5PWeIKH9CYJ8jzQVto5CZ7odE";

const supabase =
createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;

const ADMIN_EMAIL = "admin@iot.com";

// ================= UI =================

function mostrarLogin(){

    document.getElementById("loginBox")
    .style.display = "block";

    document.getElementById("galeria")
    .classList.add("hidden");

    document.getElementById("logoutBtn")
    .style.display = "none";
}

function mostrarApp(){

    document.getElementById("loginBox")
    .style.display = "none";

    document.getElementById("galeria")
    .classList.remove("hidden");

    document.getElementById("logoutBtn")
    .style.display = "inline-block";
}

// ================= INIT =================

window.onload = async () => {

    const { data } =
    await supabase.auth.getUser();

    if(data.user){

        user = data.user;

        mostrarApp();

        cargarImagenes();

    }else{

        mostrarLogin();
    }
};

// ================= LOGIN =================

window.login = async function(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const { data, error } =
    await supabase.auth.signInWithPassword({

        email,
        password

    });

    if(error){

        alert("Error login");

        console.error(error);

        return;
    }

    user = data.user;

    mostrarApp();

    cargarImagenes();
};

// ================= GUEST =================

window.guestMode = function(){

    user = {
        email: "guest"
    };

    mostrarApp();

    cargarImagenes();
};

// ================= LOGOUT =================

window.logout = async function(){

    await supabase.auth.signOut();

    location.reload();
};

// ================= GALERIA =================

async function cargarImagenes(){

    const { data, error } =
    await supabase
        .from("Imagenes")
        .select("*")
        .order("fecha", { ascending:false });

    if(error){

        console.error(error);

        return;
    }

    const galeria =
    document.getElementById("galeria");

    galeria.innerHTML = "";

    if(data.length === 0){

        galeria.innerHTML =
        "<p>No hay imágenes</p>";

        return;
    }

    data.forEach(item => {

        const card =
        document.createElement("div");

        card.className = "card";

        const img =
        document.createElement("img");

        img.src = item.url;

        img.onclick = () => {
            window.open(item.url, "_blank");
        };

        const fecha =
        document.createElement("p");

        const fechaFormateada =
        item.fecha
            .replace("T", " ")
            .split(".")[0];

        fecha.innerText =
        "📅 " + fechaFormateada;

        const gps =
        document.createElement("p");

        gps.innerText =
        `📍 ${item.lat}, ${item.lon}`;

        const mapa =
        document.createElement("a");

        mapa.href =
        `https://www.google.com/maps?q=${item.lat},${item.lon}`;

        mapa.target = "_blank";

        mapa.innerText = "Ver mapa";

        card.appendChild(img);
        card.appendChild(fecha);
        card.appendChild(gps);
        card.appendChild(mapa);

        // ===== ADMIN =====

        if(user?.email === ADMIN_EMAIL){

            const btn =
            document.createElement("button");

            btn.className = "deleteBtn";

            btn.innerText = "Eliminar";

            btn.onclick = async () => {

                const confirmar =
                confirm("¿Eliminar imagen?");

                if(!confirmar) return;

                try{

                    await fetch("/api/delete", {

                        method:"POST",

                        headers:{
                            "Content-Type":
                            "application/json"
                        },

                        body:JSON.stringify({
                            filename:item.filename
                        })
                    });

                    cargarImagenes();

                }catch(err){

                    console.error(err);

                    alert("Error eliminando");
                }
            };

            card.appendChild(btn);
        }

        galeria.appendChild(card);
    });
}

</script>

</body>
</html>
