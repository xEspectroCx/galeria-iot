<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería IoT Jetson</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

#galeria{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:20px;
}

.card{
    background:#1c1c1c;
    padding:10px;
    border-radius:10px;
    width:260px;
}

img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

img:hover{
    transform:scale(1.03);
}

p{
    margin:5px 0;
    font-size:14px;
}

a{
    color:#4da3ff;
    text-decoration:none;
}
</style>
</head>

<body>

<h1>Galería IoT Jetson</h1>

<div id="galeria"></div>

<script>

const SUPABASE_URL =
"https://vpvrqtcnbluffwlrmprs.supabase.co";

const API_KEY =
"sb_publishable_VEE3Grv0HVTDWXJSupfHmQ_iyPZsG8J";

async function cargarImagenes(){

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/imagenes?select=*`,
        {
            method: "GET",
            headers:{
                "apikey": API_KEY,
                "Authorization": `Bearer ${API_KEY}`
            }
        }
    );

    const data = await response.json();

    const galeria = document.getElementById("galeria");
    galeria.innerHTML = "";

    data.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = item.url;

        img.onclick = () => {
            window.open(item.url, "_blank");
        };

        const fecha = document.createElement("p");
        fecha.innerText = "📅 " + (item.fecha || "sin fecha");

        const gps = document.createElement("p");
        gps.innerText = `📍 ${item.lat ?? 0}, ${item.lon ?? 0}`;

        const mapa = document.createElement("a");
        mapa.href = `https://www.google.com/maps?q=${item.lat},${item.lon}`;
        mapa.target = "_blank";
        mapa.innerText = "Ver en mapa";

        card.appendChild(img);
        card.appendChild(fecha);
        card.appendChild(gps);
        card.appendChild(mapa);

        galeria.appendChild(card);
    });
}

cargarImagenes();

</script>

</body>
</html>
